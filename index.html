<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1b2a4e" />
  <title>Pioneer Fire Certificates</title>

  
  
  
  <style>
/* =====================================================
   Pioneer Fire Certificates — styles
   Color palette is drawn from the certificate template:
     navy   #1b2a4e
     cream  #f3eee2
     red    #7d1f2c
     gold   #c9a14a
   ===================================================== */

:root {
  --navy: #1b2a4e;
  --navy-2: #29396d;
  --cream: #f3eee2;
  --paper: #ffffff;
  --ink: #1a1a1a;
  --muted: #5b5b5b;
  --red: #7d1f2c;
  --gold: #c9a14a;
  --line: #d8d2c2;
  --error: #b3261e;
  --ok: #2e7d32;
  --shadow: 0 6px 18px rgba(27,42,78,0.10);
  --radius: 14px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--cream);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  font-size: 16px;
  line-height: 1.45;
  min-height: 100vh;
}

/* App bar ------------------------------------------------ */
.appbar {
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--navy);
  color: white;
  padding: 12px 18px;
  padding-top: max(12px, env(safe-area-inset-top));
}
.appbar-badge {
  width: 44px; height: 44px;
  flex-shrink: 0;
  background: var(--cream);
  border-radius: 8px;
  padding: 2px;
}
.appbar-titles { flex: 1; min-width: 0; }
.appbar-titles h1 {
  font-size: 16px;
  margin: 0;
  font-weight: 700;
  letter-spacing: 0.3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.appbar-titles p {
  margin: 0;
  font-size: 12px;
  opacity: 0.8;
}
.appbar-action {
  background: transparent;
  color: white;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 13px;
  cursor: pointer;
}
.appbar-action:hover { background: rgba(255,255,255,0.1); }

/* Layout ------------------------------------------------- */
main {
  max-width: 720px;
  margin: 24px auto;
  padding: 0 16px 80px;
}
.card {
  background: var(--paper);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 24px;
  position: relative;
}
h2 { margin: 0 0 6px; color: var(--navy); font-size: 22px; }
h3 { margin: 18px 0 10px; color: var(--navy); font-size: 17px; }
.mt { margin-top: 28px; }
.muted { color: var(--muted); font-size: 14px; margin: 6px 0 14px; }

/* Forms -------------------------------------------------- */
label {
  display: block;
  margin: 12px 0;
  font-weight: 600;
  font-size: 14px;
  color: var(--navy);
}
label.inline {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-weight: 500;
  margin-right: 18px;
  margin-bottom: 8px;
}
label.inline input { margin: 0; }
label .file-btn,
label.file-btn {
  display: inline-block;
  background: var(--navy);
  color: white;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 500;
  font-size: 14px;
}
.label-text { font-weight: 600; color: var(--navy); margin: 12px 0 6px; font-size: 14px; }

input[type=text],
input[type=email],
input[type=number],
input[type=date],
select {
  width: 100%;
  padding: 10px 12px;
  font-size: 15px;
  border: 1px solid var(--line);
  border-radius: 8px;
  margin-top: 4px;
  background: white;
  color: var(--ink);
  font-family: inherit;
}
input:focus, select:focus { outline: 2px solid var(--navy); outline-offset: 0; }

.grid2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
@media (max-width: 540px) { .grid2 { grid-template-columns: 1fr; } }

fieldset {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 12px 14px;
  margin: 14px 0;
}
legend { font-weight: 600; color: var(--navy); padding: 0 6px; font-size: 14px; }

/* Buttons ----------------------------------------------- */
button {
  font-family: inherit;
  cursor: pointer;
}
button.primary {
  background: var(--navy);
  color: white;
  border: 0;
  padding: 12px 20px;
  border-radius: 10px;
  font-weight: 600;
  font-size: 15px;
}
button.primary:hover { background: var(--navy-2); }
button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
button.link {
  background: transparent;
  border: 0;
  color: var(--navy);
  text-decoration: underline;
  font-size: 14px;
  padding: 6px 8px;
}
button.back {
  position: absolute;
  top: 16px;
  right: 16px;
  background: transparent;
  border: 0;
  color: var(--navy);
  font-size: 14px;
  text-decoration: underline;
}
.row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 14px; }
.row.right { justify-content: flex-end; }
.row.split { justify-content: space-between; }
.stack > * { margin-bottom: 12px; }

/* Big home action ---------------------------------------- */
.actions { margin-top: 18px; }
.big-action {
  width: 100%;
  background: linear-gradient(135deg, #fff, #faf6ec);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 22px;
  text-align: left;
  display: grid;
  grid-template-columns: 56px 1fr;
  grid-template-rows: auto auto;
  column-gap: 18px;
  align-items: center;
  cursor: pointer;
  transition: transform 0.12s ease, box-shadow 0.12s ease;
}
.big-action:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
.big-icon { grid-row: 1 / span 2; font-size: 38px; text-align: center; }
.big-title { font-weight: 700; color: var(--navy); font-size: 17px; }
.big-sub { color: var(--muted); font-size: 13px; }
.welcome { font-size: 13px; color: var(--muted); margin: 0 0 8px; }

/* Steps -------------------------------------------------- */
.steps {
  list-style: none;
  display: flex;
  gap: 6px;
  padding: 0;
  margin: 8px 0 22px;
  font-size: 12px;
  flex-wrap: wrap;
}
.steps li {
  flex: 1 1 0;
  text-align: center;
  padding: 8px 4px;
  border-radius: 8px;
  background: #eee9da;
  color: var(--muted);
  font-weight: 600;
  min-width: 70px;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: rgba(27, 42, 78, 0.18);
  touch-action: manipulation;
  transition: background 160ms ease, color 160ms ease, transform 120ms ease;
}
.steps li:hover { filter: brightness(0.97); }
.steps li:active { transform: scale(0.97); }
.steps li:focus-visible {
  outline: 2px solid var(--navy);
  outline-offset: 2px;
}
.steps li.active { background: var(--navy); color: white; }
.steps li.done { background: var(--gold); color: white; }

/* Sliding wizard ----------------------------------------- */
.step-stage {
  position: relative;
  overflow: hidden;
  /* a touch of horizontal padding so finger drags near the edge still register */
}
.step {
  transition: transform 320ms cubic-bezier(0.22, 0.84, 0.34, 1.04),
              opacity   220ms ease;
  will-change: transform, opacity;
  width: 100%;
}
.step.hidden { display: none; }
/* During an animated transition, the outgoing step is positioned
   absolutely so the new step can take its place without any layout jump. */
.step.is-leaving {
  position: absolute;
  top: 0; left: 0; right: 0;
  pointer-events: none;
}
/* While the user is dragging with their finger, this class disables
   the CSS transition so the form follows the pointer in real time. */
.step.is-dragging,
.step.is-dragging-peek {
  transition: none;
}
.step.is-dragging-peek {
  position: absolute;
  top: 0; left: 0; right: 0;
  pointer-events: none;
}

/* Signature pad ----------------------------------------- */
.sigpad {
  border: 1px solid var(--line);
  border-radius: 10px;
  background: #fff;
  position: relative;
  overflow: hidden;
}
.sigpad canvas {
  display: block;
  width: 100%;
  height: 180px;
  touch-action: none;
  background: repeating-linear-gradient(0deg, #fff, #fff 30px, #fbfaf4 30px, #fbfaf4 31px);
}
.sigpad-actions {
  display: flex;
  justify-content: flex-end;
  padding: 4px 8px;
  border-top: 1px solid var(--line);
  background: #fafaf6;
}

/* Roster table ------------------------------------------ */
.roster {
  width: 100%;
  border-collapse: collapse;
  margin-top: 14px;
}
.roster th, .roster td {
  border-bottom: 1px solid var(--line);
  padding: 6px 6px;
  text-align: left;
  font-size: 14px;
}
.roster th { color: var(--navy); font-weight: 600; }
.roster td input {
  width: 100%;
  padding: 6px 8px;
  border: 1px solid transparent;
  border-radius: 6px;
  font-size: 14px;
  background: #fafaf6;
}
.roster td input:focus { background: white; border-color: var(--navy); outline: none; }
.roster .row-num { width: 40px; color: var(--muted); }
.roster .row-del { width: 40px; text-align: center; }
.roster .del-btn {
  background: transparent;
  border: 0;
  color: var(--error);
  font-weight: 700;
  cursor: pointer;
  font-size: 16px;
  padding: 0 6px;
}

/* Review block ------------------------------------------ */
.review {
  background: #fafaf6;
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 12px 14px;
  margin: 12px 0 18px;
}
.review > div {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px dashed var(--line);
  font-size: 14px;
}
.review > div:last-child { border-bottom: 0; }
.review span { color: var(--muted); }
.review strong { color: var(--ink); text-align: right; max-width: 70%; }

/* Misc -------------------------------------------------- */
.hidden { display: none !important; }
.error { color: var(--error); font-size: 13px; margin: 6px 0 0; min-height: 18px; }
.banner {
  background: #fef6dd;
  border: 1px solid #e8d99c;
  color: #6b5500;
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 13px;
}
.demoCode {
  display: inline-block;
  background: white;
  padding: 2px 8px;
  border-radius: 6px;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-weight: 700;
  letter-spacing: 2px;
  font-size: 16px;
  color: var(--navy);
  margin-left: 4px;
}
.status {
  margin-top: 14px;
  padding: 10px 12px;
  background: #ecf3ff;
  border: 1px solid #cad8f3;
  color: var(--navy);
  border-radius: 8px;
  font-size: 14px;
}
.status.ok { background: #ecf7ee; border-color: #b8e0bf; color: var(--ok); }
.status.err { background: #fdecec; border-color: #f0c4c4; color: var(--error); }

.downloads { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
.downloads a {
  background: white;
  border: 1px solid var(--line);
  padding: 10px 12px;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  text-decoration: none;
  color: var(--navy);
  font-size: 14px;
}
.downloads a:hover { background: #fafaf6; }

.preview {
  margin-top: 22px;
  padding: 14px;
  background: #fafaf6;
  border: 1px solid var(--line);
  border-radius: 10px;
}
.preview canvas {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 6px;
  box-shadow: var(--shadow);
}

code {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  background: #f0eada;
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 13px;
}

/* Admin-only demo panel ---------------------------------- */
.demo-panel .demo-row {
  display: flex;
  align-items: center;
  gap: 12px;
  justify-content: space-between;
}
.demo-panel .demo-label { flex: 1; min-width: 0; }
.demo-panel code {
  background: #f0eada;
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 12px;
}
.demo-toggle {
  appearance: none;
  border: none;
  cursor: pointer;
  width: 88px;
  height: 34px;
  border-radius: 999px;
  padding: 0 6px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.06em;
  transition: background 180ms ease, color 180ms ease;
  position: relative;
  -webkit-tap-highlight-color: transparent;
}
.demo-toggle.off { background: #ddd6c4; color: #5b5b5b; }
.demo-toggle.on  { background: var(--navy); color: #fff; }
.demo-toggle .demo-knob {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 1px 2px rgba(0,0,0,0.25);
  transition: transform 200ms cubic-bezier(0.22, 0.84, 0.34, 1.04);
}
.demo-toggle.on  .demo-knob { transform: translateX(50px); }
.demo-toggle.off .demo-knob { transform: translateX(0); }
.demo-toggle .demo-state {
  position: absolute;
  left: 0; right: 0;
  text-align: center;
  pointer-events: none;
}
.demo-toggle.on .demo-state  { padding-right: 30px; }
.demo-toggle.off .demo-state { padding-left: 30px; }

</style>

<main id="app"></main>

<!--==================== TEMPLATES ====================-->

<!-- LOGIN: email entry -->
<template id="tpl-login-email">
  <section class="card">
    <h2>Sign in</h2>
    <p class="muted">Enter your <strong>@pioneerfire.org</strong> email address. We'll send you a 6-digit code to verify it's you.</p>
    <form id="emailForm" class="stack">
      <label>Department email
        <input type="email" id="emailInput" autocomplete="email" required placeholder="firstname.lastname@pioneerfire.org" />
      </label>
      <p id="emailErr" class="error"></p>
      <button class="primary" type="submit">Send code</button>
    </form>
  </section>
</template>

<!-- LOGIN: code entry -->
<template id="tpl-login-code">
  <section class="card">
    <h2>Enter your code</h2>
    <p class="muted">A 6-digit code was sent to <strong id="codeEmail"></strong>. It expires in 10 minutes.</p>
    <p id="demoCodeBanner" class="banner hidden">
      <strong>Demo mode:</strong> EmailJS is not configured yet, so your code is
      <span id="demoCodeValue" class="demoCode"></span>
    </p>
    <form id="codeForm" class="stack">
      <label>Verification code
        <input type="text" id="codeInput" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required placeholder="123456" />
      </label>
      <p id="codeErr" class="error"></p>
      <button class="primary" type="submit">Verify &amp; sign in</button>
      <button class="link" type="button" id="resendBtn">Resend code</button>
      <button class="link" type="button" id="changeEmailBtn">Use a different email</button>
    </form>
  </section>
</template>

<!-- HOME -->
<template id="tpl-home">
  <section class="card">
    <p class="welcome">Signed in as <strong id="meEmail"></strong></p>
    <h2>What would you like to do?</h2>
    <div class="actions">
      <button class="big-action" id="issueBtn" type="button">
        <span class="big-icon">📜</span>
        <span class="big-title">Issue Certificate</span>
        <span class="big-sub">Create completion certificates for one or more students</span>
      </button>
    </div>
  </section>
</template>

<!-- ISSUE CERTIFICATE -->
<template id="tpl-issue">
  <section class="card">
    <button class="back" id="backHome" type="button">&larr; Back</button>
    <h2>Issue Certificate</h2>
    <ol id="stepIndicator" class="steps">
      <li data-step="1">Course</li>
      <li data-step="2">Instructors</li>
      <li data-step="3">Roster</li>
      <li data-step="4">Generate</li>
    </ol>

    <div class="step-stage">
    <!-- STEP 1: course -->
    <div class="step" data-step="1">
      <h3>Course details</h3>
      <div class="grid2">
        <label>Course name
          <input type="text" id="courseName" required placeholder="e.g. RT-130 Wildland Fire Safety Training Annual Refresher (WFSTAR)" />
        </label>
        <label>Course #
          <input type="text" id="courseNumber" required placeholder="e.g. RT-130" />
        </label>
      </div>

      <fieldset class="dateMode">
        <legend>Course completion date</legend>
        <label class="inline"><input type="radio" name="dateMode" value="single" checked /> Single date</label>
        <label class="inline"><input type="radio" name="dateMode" value="range" /> Date range (start &amp; end)</label>
      </fieldset>
      <div class="grid2">
        <label>Start date
          <input type="date" id="dateStart" required />
        </label>
        <label id="dateEndWrap" class="hidden">End date
          <input type="date" id="dateEnd" />
        </label>
      </div>

      <label>Course logo (optional, shown bottom-center)
        <select id="courseLogo"></select>
      </label>

      <div class="row right">
        <button class="primary" id="step1Next" type="button">Continue &rarr;</button>
      </div>
    </div>

    <!-- STEP 2: instructors -->
    <div class="step hidden" data-step="2">
      <h3>Primary Instructor</h3>
      <label>Name &amp; title
        <input type="text" id="primaryName" required placeholder="e.g. Dave Welch - SOFC / Lead Instructor" />
      </label>
      <p class="label-text">Signature</p>
      <div class="sigpad">
        <canvas id="primarySigCanvas"></canvas>
        <div class="sigpad-actions">
          <button class="link" type="button" data-clear="primarySigCanvas">Clear</button>
        </div>
      </div>

      <h3 class="mt">Co-Instructor</h3>
      <label class="inline">
        <input type="checkbox" id="coNA" />
        No co-instructor (leave bottom-right blank)
      </label>
      <div id="coBlock">
        <label>Name &amp; title
          <input type="text" id="coName" placeholder="e.g. Mike Stutts - STEN / Co-Instructor" />
        </label>
        <p class="label-text">Signature</p>
        <div class="sigpad">
          <canvas id="coSigCanvas"></canvas>
          <div class="sigpad-actions">
            <button class="link" type="button" data-clear="coSigCanvas">Clear</button>
          </div>
        </div>
      </div>

      <div class="row split">
        <button class="link" data-prev="2" type="button">&larr; Back</button>
        <button class="primary" id="step2Next" type="button">Continue &rarr;</button>
      </div>
    </div>

    <!-- STEP 3: roster -->
    <div class="step hidden" data-step="3">
      <h3>Roster</h3>
      <label>Number of students
        <input type="number" id="numStudents" min="1" max="500" value="1" />
      </label>

      <p class="muted">Build the roster manually below, or upload a CSV / spreadsheet of students. CSV columns: <code>First Name, Last Name</code>.</p>
      <div class="row">
        <label class="file-btn">
          Upload roster
          <input type="file" id="rosterFile" accept=".csv,.tsv,.txt" hidden />
        </label>
        <button class="link" id="addRow" type="button">+ Add row</button>
        <button class="link" id="clearRoster" type="button">Clear all</button>
      </div>

      <table class="roster">
        <thead>
          <tr><th>#</th><th>First name</th><th>Last name</th><th></th></tr>
        </thead>
        <tbody id="rosterBody"></tbody>
      </table>

      <div class="row split">
        <button class="link" data-prev="3" type="button">&larr; Back</button>
        <button class="primary" id="step3Next" type="button">Continue &rarr;</button>
      </div>
    </div>

    <!-- STEP 4: generate -->
    <div class="step hidden" data-step="4">
      <h3>Generate certificates</h3>
      <p class="muted">Review your selections, then choose how you'd like the file(s) saved.</p>

      <div class="review">
        <div><span>Course</span><strong id="rvCourse"></strong></div>
        <div><span>Course #</span><strong id="rvNumber"></strong></div>
        <div><span>Date</span><strong id="rvDate"></strong></div>
        <div><span>Primary instructor</span><strong id="rvPrimary"></strong></div>
        <div><span>Co-instructor</span><strong id="rvCo"></strong></div>
        <div><span>Students</span><strong id="rvCount"></strong></div>
      </div>

      <fieldset>
        <legend>Output format</legend>
        <label class="inline"><input type="radio" name="outFmt" value="combined" checked /> One PDF containing every certificate</label>
        <label class="inline"><input type="radio" name="outFmt" value="separate" /> One PDF per student (FInitialLastName.pdf)</label>
      </fieldset>

      <div class="row split">
        <button class="link" data-prev="4" type="button">&larr; Back</button>
        <button class="primary" id="generateBtn" type="button">Generate</button>
      </div>

      <div id="generateStatus" class="status hidden"></div>
      <div id="downloadList" class="downloads"></div>

      <div class="preview hidden" id="previewWrap">
        <h3>Preview (first student)</h3>
        <canvas id="previewCanvas"></canvas>
      </div>
    </div>
    </div><!-- /.step-stage -->

  </section>
</template>

    // Resize the backing store for hi-DPI screens.
    function resize() {
      const ratio = Math.max(window.devicePixelRatio || 1, 1);
      const w = canvas.offsetWidth;
      const h = canvas.offsetHeight;
      canvas.width = w * ratio;
      canvas.height = h * ratio;
      const ctx = canvas.getContext('2d');
      ctx.scale(ratio, ratio);
    }
    resize();
    const pad = new SignaturePad(canvas, {
      backgroundColor: 'rgba(0,0,0,0)',
      penColor: '#1b2a4e',
      minWidth: 0.7,
      maxWidth: 2.4
    });
    // Re-resize on viewport changes.  signature_pad clears the
    // canvas on resize, so warn the user only if they had drawn
    // something already.
    let lastSig = null;
    window.addEventListener('resize', () => {
      lastSig = pad.toData();
      resize();
      if (lastSig) pad.fromData(lastSig);
    });
    return pad;
  }

  // Returns null if the pad is empty, otherwise a PNG dataURL of
  // just the signature with a transparent background.
  function toPNG(pad) {
    if (!pad || pad.isEmpty()) return null;
    return pad.toDataURL('image/png');
  }

  return { attach, toPNG };

})();

<script>
// Login + verification-code flow.
//
// Strategy: the app generates a 6-digit code, stores a HASH of it
// (plus the email and an expiry timestamp) in localStorage, and
// dispatches the plaintext code to the user's email via EmailJS.
// When the user enters the code, we hash + compare.
//
// If EmailJS keys aren't filled in (config.js) the app falls back
// to DEMO MODE which displays the code on screen — useful while
// you finish the EmailJS setup.

window.PFD_AUTH = (function () {
  const cfg = () => window.PFD_CONFIG;
  const KEY_PENDING = 'pfd_pending_code';
  const KEY_SESSION = 'pfd_session';
  // Admin-only demo-mode flags (per-device, localStorage).
  const KEY_DEMO_UNLOCKED = 'pfd_demo_unlocked';
  const KEY_DEMO_ENABLED  = 'pfd_demo_enabled';

  // ---- helpers ----
  function isAllowed(email) {
    if (!email) return false;
    return email.toLowerCase().endsWith(cfg().ALLOWED_DOMAIN.toLowerCase());
  }

  function rand6() {
    // crypto-grade random 6-digit code (000000–999999, zero-padded).
    const buf = new Uint32Array(1);
    crypto.getRandomValues(buf);
    return String(buf[0] % 1_000_000).padStart(6, '0');
  }

  async function sha256Hex(str) {
    const data = new TextEncoder().encode(str);
    const hash = await crypto.subtle.digest('SHA-256', data);
    return [...new Uint8Array(hash)].map(b => b.toString(16).padStart(2,'0')).join('');
  }

  function emailJSReady() {
    const c = cfg();
    return !!(c.EMAILJS_PUBLIC_KEY && c.EMAILJS_SERVICE_ID && c.EMAILJS_TEMPLATE_ID && window.emailjs);
  }

  function initEmailJS() {
    if (emailJSReady() && !initEmailJS._done) {
      window.emailjs.init({ publicKey: cfg().EMAILJS_PUBLIC_KEY });
      initEmailJS._done = true;
    }
  }

  // ---- public API ----

  // Send a code to the email.  Returns:
  //   { ok: true, demo: false }                    real send succeeded
  //   { ok: true, demo: true,  code: '123456' }    demo mode (no EmailJS)
  //   { ok: false, error: '...' }                  failure
  async function sendCode(email) {
    email = (email || '').trim().toLowerCase();
    if (!isAllowed(email)) {
      return { ok: false, error: 'Email must end in ' + cfg().ALLOWED_DOMAIN };
    }
    const code = rand6();
    const hash = await sha256Hex(code + ':' + email);
    const ttlMs = cfg().CODE_TTL_MINUTES * 60 * 1000;
    const pending = { email, hash, expires: Date.now() + ttlMs, attempts: 0 };
    localStorage.setItem(KEY_PENDING, JSON.stringify(pending));

    if (!emailJSReady()) {
      // Demo mode — surface the code so the developer can sign in.
      return { ok: true, demo: true, code };
    }
    try {
      initEmailJS();
      await window.emailjs.send(
        cfg().EMAILJS_SERVICE_ID,
        cfg().EMAILJS_TEMPLATE_ID,
        {
          to_email: email,
          passcode: code,
          ttl_minutes: cfg().CODE_TTL_MINUTES,
          app_name: 'Pioneer Fire Certificates'
        }
      );
      return { ok: true, demo: false };
    } catch (err) {
      console.error('EmailJS send failed:', err);
      // Fall back to demo so the user is never locked out by a
      // misconfiguration — but flag it.
      return { ok: true, demo: true, code, warning: 'Email failed to send. Showing code in demo mode.' };
    }
  }

  function pendingEmail() {
    try {
      const p = JSON.parse(localStorage.getItem(KEY_PENDING) || 'null');
      return p && p.email;
    } catch { return null; }
  }

  // Verify the entered code.  Returns true if accepted; otherwise
  // false and increments the attempt counter (max 5 tries).
  async function verifyCode(input) {
    let pending;
    try { pending = JSON.parse(localStorage.getItem(KEY_PENDING) || 'null'); }
    catch { pending = null; }
    if (!pending) return { ok: false, error: 'No code requested. Please request a new code.' };
    if (Date.now() > pending.expires) {
      localStorage.removeItem(KEY_PENDING);
      return { ok: false, error: 'That code expired. Request a new one.' };
    }
    if (pending.attempts >= 5) {
      localStorage.removeItem(KEY_PENDING);
      return { ok: false, error: 'Too many attempts. Request a new code.' };
    }
    // Strip anything that isn't a digit so pastes like "123 456",
    // "123-456", or "Your code: 123456" still work.
    const trial = (input || '').replace(/\D+/g, '');
    if (trial.length !== 6) {
      return { ok: false, error: 'Code must be 6 digits.' };
    }
    const hash = await sha256Hex(trial + ':' + pending.email);
    if (hash === pending.hash) {
      // success — clear pending, mint a session
      localStorage.removeItem(KEY_PENDING);
      const session = {
        email: pending.email,
        expires: Date.now() + cfg().SESSION_HOURS * 3600 * 1000
      };
      localStorage.setItem(KEY_SESSION, JSON.stringify(session));
      return { ok: true, email: pending.email };
    }
    pending.attempts += 1;
    localStorage.setItem(KEY_PENDING, JSON.stringify(pending));
    return { ok: false, error: 'Incorrect code. ' + (5 - pending.attempts) + ' attempt(s) left.' };
  }

  function currentUser() {
    try {
      const s = JSON.parse(localStorage.getItem(KEY_SESSION) || 'null');
      if (!s) return null;
      if (Date.now() > s.expires) { localStorage.removeItem(KEY_SESSION); return null; }
      return s.email;
    } catch { return null; }
  }

  function signOut() {
    localStorage.removeItem(KEY_SESSION);
    localStorage.removeItem(KEY_PENDING);
  }

  function clearPending() { localStorage.removeItem(KEY_PENDING); }

  // ---- Admin-only demo-mode controls ----
  // These are per-device (localStorage). The panel only appears for
  // someone who has already entered the admin passcode on this device.
  function isDemoUnlocked() {
    return localStorage.getItem(KEY_DEMO_UNLOCKED) === '1';
  }
  function isDemoEnabled() {
    return isDemoUnlocked() && localStorage.getItem(KEY_DEMO_ENABLED) === '1';
  }
  function setDemoEnabled(on) {
    if (on) localStorage.setItem(KEY_DEMO_ENABLED, '1');
    else    localStorage.removeItem(KEY_DEMO_ENABLED);
  }
  // Returns true if the passcode matches and the feature gets unlocked.
  function unlockDemo(passcode) {
    const expected = String(cfg().DEMO_PASSCODE || '').trim();
    if (!expected) return false;
    if (String(passcode || '').trim() !== expected) return false;
    localStorage.setItem(KEY_DEMO_UNLOCKED, '1');
    return true;
  }
  // Hide the panel on this device (also turns demo off).
  function lockDemo() {
    localStorage.removeItem(KEY_DEMO_UNLOCKED);
    localStorage.removeItem(KEY_DEMO_ENABLED);
  }
  // Mint a session as DEMO_SIGN_IN_EMAIL, bypassing the code flow.
  // Only works if demo has been unlocked AND enabled.
  function demoSignIn() {
    if (!isDemoEnabled()) return { ok: false, error: 'Demo mode is off.' };
    const email = String(cfg().DEMO_SIGN_IN_EMAIL || '').trim().toLowerCase()
                  || 'admin@pioneerfire.org';
    const session = {
      email,
      expires: Date.now() + cfg().SESSION_HOURS * 3600 * 1000,
      demo: true
    };
    localStorage.setItem(KEY_SESSION, JSON.stringify(session));
    localStorage.removeItem(KEY_PENDING);
    return { ok: true, email };
  }

  return {
    sendCode, verifyCode, currentUser, signOut, isAllowed, pendingEmail,
    clearPending, emailJSReady,
    isDemoUnlocked, isDemoEnabled, setDemoEnabled, unlockDemo, lockDemo, demoSignIn
  };

})();

</script>

    return _tpl;
  }

  // --- date formatting --------------------------------------
  function fmtDate(iso) {
    if (!iso) return '';
    const [y, m, d] = iso.split('-').map(Number);
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    return months[m-1] + ' ' + d + ', ' + y;
  }
  function dateString(state) {
    if (state.dateMode === 'range' && state.dateEnd) {
      return fmtDate(state.dateStart) + ' – ' + fmtDate(state.dateEnd);
    }
    return fmtDate(state.dateStart);
  }
  function courseLineText(state) {
    const num = (state.courseNumber || '').trim();
    const nm  = (state.courseName   || '').trim();
    if (num && nm) return num + ' ' + nm;
    return num || nm;
  }

  // --- canvas drawing ---------------------------------------
  function fitFont(ctx, text, baseSize, maxWidth, fontTpl) {
    let size = baseSize;
    ctx.font = fontTpl.replace('{SIZE}', size);
    while (ctx.measureText(text).width > maxWidth && size > baseSize * 0.5) {
      size -= 2;
      ctx.font = fontTpl.replace('{SIZE}', size);
    }
    return size;
  }

  function drawCenteredText(ctx, text, posKey, opts = {}) {
    if (!text) return;
    const p = POS[posKey];
    const baseSize = p.size * CANVAS_H;
    const maxWidth = (opts.maxWidth || 0.78) * CANVAS_W;
    const fontTpl  = p.font;
    fitFont(ctx, text, baseSize, maxWidth, fontTpl);
    ctx.fillStyle = p.color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, p.x * CANVAS_W, p.y * CANVAS_H);
  }

  function drawImageCentered(ctx, img, posKey) {
    const p = POS[posKey];
    const w = p.w * CANVAS_W;
    const h = p.h * CANVAS_H;
    // Preserve aspect ratio inside the box.
    const ar = img.width / img.height;
    let dw = w, dh = h;
    if (ar > w / h) { dh = w / ar; } else { dw = h * ar; }
    const dx = p.x * CANVAS_W - dw / 2;
    const dy = p.y * CANVAS_H - dh / 2;
    ctx.drawImage(img, dx, dy, dw, dh);
  }

  // Renders one certificate to a fresh canvas and returns it.
  async function renderToCanvas(state, student) {
    const tpl = await getTemplate();
    const cvs = document.createElement('canvas');
    cvs.width = CANVAS_W;
    cvs.height = CANVAS_H;
    const ctx = cvs.getContext('2d');

    // 1. background template
    ctx.drawImage(tpl, 0, 0, CANVAS_W, CANVAS_H);

    // 2. student name
    const fullName = (student.first + ' ' + student.last).trim();
    drawCenteredText(ctx, fullName, 'studentName', { maxWidth: 0.78 });

    // 3. course line
    drawCenteredText(ctx, courseLineText(state), 'courseLine', { maxWidth: 0.86 });

    // 4. date
    drawCenteredText(ctx, dateString(state), 'completionDate', { maxWidth: 0.6 });

    // 5. instructor signatures + names
    if (state.primarySigImg) {
      const im = await loadImage(state.primarySigImg);
      drawImageCentered(ctx, im, 'primarySig');
    }
    if (state.primaryName) drawCenteredText(ctx, state.primaryName, 'primaryName', { maxWidth: 0.34 });

    if (!state.coNA) {
      if (state.coSigImg) {
        const im = await loadImage(state.coSigImg);
        drawImageCentered(ctx, im, 'coSig');
      }
      if (state.coName) drawCenteredText(ctx, state.coName, 'coName', { maxWidth: 0.34 });
    }

    // 6. optional course logo (centered between signatures)
    if (state.courseLogoSrc) {
      try {
        const im = await loadImage(state.courseLogoSrc);
        drawImageCentered(ctx, im, 'courseLogo');
      } catch { /* ignore */ }
    }

    return cvs;
  }

  // --- PDF building -----------------------------------------
  function makePDF() {
    const { jsPDF } = window.jspdf;
    return new jsPDF({
      orientation: 'landscape',
      unit: 'in',
      format: [PDF_W_IN, PDF_H_IN],
      compress: true
    });
  }

  function canvasToPDF(pdf, canvas, addPage) {
    if (addPage) pdf.addPage([PDF_W_IN, PDF_H_IN], 'landscape');
    const data = canvas.toDataURL('image/jpeg', 0.92);
    pdf.addImage(data, 'JPEG', 0, 0, PDF_W_IN, PDF_H_IN, undefined, 'FAST');
  }

  function fileSafe(s) {
    return (s || '').replace(/[\\/:*?"<>|]+/g, '').replace(/\s+/g, '_');
  }
  function studentFileName(student) {
    const first = (student.first || '').trim();
    const last  = (student.last  || '').trim();
    const fi = first ? first.charAt(0).toUpperCase() : '';
    return fileSafe(fi + last) || 'certificate';
  }

  // Generate certificates for every student, returning an array
  // of { name, blob } objects.  outputMode: 'combined' or 'separate'.
  // onProgress is called with (done, total).
  async function generate(state, students, outputMode, onProgress) {
    const out = [];
    if (outputMode === 'combined') {
      const pdf = makePDF();
      for (let i = 0; i < students.length; i++) {
        const cvs = await renderToCanvas(state, students[i]);
        canvasToPDF(pdf, cvs, i > 0);
        if (onProgress) onProgress(i + 1, students.length);
      }
      const safeCourse = fileSafe(state.courseNumber || state.courseName || 'Certificate');
      const date = (state.dateStart || '').replace(/-/g, '');
      out.push({ name: safeCourse + '_' + date + '_All.pdf', blob: pdf.output('blob') });
    } else {
      for (let i = 0; i < students.length; i++) {
        const cvs = await renderToCanvas(state, students[i]);
        const pdf = makePDF();
        canvasToPDF(pdf, cvs, false);
        out.push({ name: studentFileName(students[i]) + '.pdf', blob: pdf.output('blob') });
        if (onProgress) onProgress(i + 1, students.length);
      }
    }
    return out;
  }

  // For a quick on-screen preview.
  async function previewCanvas(state, student, intoCanvas) {
    const cvs = await renderToCanvas(state, student);
    const ctx = intoCanvas.getContext('2d');
    intoCanvas.width = cvs.width;
    intoCanvas.height = cvs.height;
    ctx.drawImage(cvs, 0, 0);
  }

  return { generate, previewCanvas, studentFileName };

})();

<script>
// Main app controller — screen routing, form state, glue.

(function () {
  const $   = (sel, root = document) => root.querySelector(sel);
  const $$  = (sel, root = document) => Array.from(root.querySelectorAll(sel));
  const app = $('#app');

  // ---------------- screen rendering -------------------------
  function show(tplId, fill) {
    const tpl = document.getElementById(tplId);
    app.innerHTML = '';
    app.appendChild(tpl.content.cloneNode(true));
    if (fill) fill();
  }

  // ---------------- service worker ---------------------------
  if (false && 'serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(() => {/* ignore */});
    });
  }

  // ---------------- session bootstrap ------------------------
  function refreshChrome() {
    const me = PFD_AUTH.currentUser();
    $('#logoutBtn').classList.toggle('hidden', !me);
  }
  $('#logoutBtn').addEventListener('click', () => {
    PFD_AUTH.signOut();
    refreshChrome();
    showLogin();
  });

  function start() {
    refreshChrome();
    if (PFD_AUTH.currentUser()) showHome();
    else if (PFD_AUTH.pendingEmail()) showCode();
    else showLogin();
  }

  // ============== LOGIN: email entry =========================
  function showLogin() {
    show('tpl-login-email', () => {
      const f = $('#emailForm');
      f.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = $('#emailInput').value.trim();
        $('#emailErr').textContent = '';
        if (!PFD_AUTH.isAllowed(email)) {
          $('#emailErr').textContent = 'Only ' + PFD_CONFIG.ALLOWED_DOMAIN + ' emails can sign in.';
          return;
        }
        const btn = f.querySelector('button[type=submit]');
        btn.disabled = true; btn.textContent = 'Sending…';
        const res = await PFD_AUTH.sendCode(email);
        btn.disabled = false; btn.textContent = 'Send code';
        if (!res.ok) { $('#emailErr').textContent = res.error; return; }
        showCode(res.demo ? res.code : null, res.warning);
      });
      // Admin-only demo panel + unlock gesture
      renderDemoPanel();
      armDemoUnlockGesture();
    });
  }

  // ---- Admin-only demo mode (hidden) -------------------------
  // Unlock: tap the appbar badge 7 times within 3 seconds, then enter
  // the passcode from PFD_CONFIG.DEMO_PASSCODE.
  function armDemoUnlockGesture() {
    const badge = document.querySelector('.appbar-badge');
    if (!badge || badge.dataset.demoArmed === '1') return;
    badge.dataset.demoArmed = '1';
    let taps = 0;
    let first = 0;
    badge.style.cursor = 'pointer';
    badge.addEventListener('click', () => {
      const now = Date.now();
      if (now - first > 3000) { taps = 0; first = now; }
      taps += 1;
      if (taps >= 7) {
        taps = 0;
        if (PFD_AUTH.isDemoUnlocked()) {
          renderDemoPanel();
          alert('Demo panel already unlocked.');
          return;
        }
        const pass = prompt('Admin passcode:');
        if (pass == null) return; // cancelled
        if (PFD_AUTH.unlockDemo(pass)) {
          renderDemoPanel();
          alert('Demo panel unlocked on this device.');
        } else {
          alert('Wrong passcode.');
        }
      }
    });
  }

  function renderDemoPanel() {
    // Only render if we're on the login screen and the panel is unlocked.
    const host = $('#emailForm') && $('#emailForm').parentElement;
    if (!host) return;
    // Remove any existing panel first
    const old = document.getElementById('demoPanel');
    if (old) old.remove();
    if (!PFD_AUTH.isDemoUnlocked()) return;

    const enabled = PFD_AUTH.isDemoEnabled();
    const panel = document.createElement('div');
    panel.id = 'demoPanel';
    panel.className = 'demo-panel';
    panel.innerHTML =
      '<hr style="border:none;border-top:1px dashed #d3cdbb;margin:18px 0 12px;">' +
      '<div class="demo-row">' +
        '<div class="demo-label">' +
          '<strong>Demo mode</strong> <span class="muted">(admin)</span><br>' +
          '<span class="muted" style="font-size:12px;">Signs you in as <code>' +
            (PFD_CONFIG.DEMO_SIGN_IN_EMAIL || 'admin@pioneerfire.org') +
          '</code> without a code.</span>' +
        '</div>' +
        '<button type="button" class="demo-toggle ' + (enabled ? 'on' : 'off') + '" id="demoToggle" aria-pressed="' + enabled + '">' +
          '<span class="demo-knob"></span>' +
          '<span class="demo-state">' + (enabled ? 'ON' : 'OFF') + '</span>' +
        '</button>' +
      '</div>' +
      (enabled
        ? '<button type="button" class="primary" id="demoSignInBtn" style="margin-top:10px;">Sign in without code</button>'
        : '') +
      '<div style="margin-top:10px;">' +
        '<button type="button" class="link" id="demoLockBtn">Hide this panel on this device</button>' +
      '</div>';
    host.appendChild(panel);

    $('#demoToggle').addEventListener('click', () => {
      PFD_AUTH.setDemoEnabled(!PFD_AUTH.isDemoEnabled());
      renderDemoPanel();
    });
    if (enabled) {
      $('#demoSignInBtn').addEventListener('click', () => {
        const res = PFD_AUTH.demoSignIn();
        if (!res.ok) { alert(res.error || 'Demo sign-in failed.'); return; }
        refreshChrome();
        showHome();
      });
    }
    $('#demoLockBtn').addEventListener('click', () => {
      if (!confirm('Hide the demo panel on this device? You can unlock it again by tapping the badge 7 times.')) return;
      PFD_AUTH.lockDemo();
      renderDemoPanel();
    });
  }

  // ============== LOGIN: code entry =========================
  function showCode(demoCode, warning) {
    show('tpl-login-code', () => {
      $('#codeEmail').textContent = PFD_AUTH.pendingEmail() || '';
      if (demoCode) {
        $('#demoCodeBanner').classList.remove('hidden');
        $('#demoCodeValue').textContent = demoCode;
        if (warning) $('#demoCodeBanner').insertAdjacentHTML('beforeend', '<br><em>' + warning + '</em>');
      }
      $('#codeForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        $('#codeErr').textContent = '';
        const code = $('#codeInput').value.trim();
        const res = await PFD_AUTH.verifyCode(code);
        if (!res.ok) { $('#codeErr').textContent = res.error; return; }
        refreshChrome();
        showHome();
      });
      $('#resendBtn').addEventListener('click', async () => {
        const email = PFD_AUTH.pendingEmail();
        if (!email) { showLogin(); return; }
        const res = await PFD_AUTH.sendCode(email);
        if (res.ok && res.demo) {
          $('#demoCodeBanner').classList.remove('hidden');
          $('#demoCodeValue').textContent = res.code;
        } else if (res.ok) {
          $('#codeErr').textContent = '';
          alert('A new code has been sent.');
        } else {
          $('#codeErr').textContent = res.error;
        }
      });
      $('#changeEmailBtn').addEventListener('click', () => {
        PFD_AUTH.clearPending();
        showLogin();
      });
    });
  }

  // ============== HOME ======================================
  function showHome() {
    show('tpl-home', () => {
      $('#meEmail').textContent = PFD_AUTH.currentUser() || '';
      $('#issueBtn').addEventListener('click', showIssue);
    });
  }

  // ============== ISSUE CERTIFICATE =========================
  function showIssue() {
    show('tpl-issue', () => initIssue());
  }

  function initIssue() {
    // ---------- shared state ----------
    const state = {
      courseName: '',
      courseNumber: '',
      dateMode: 'single',
      dateStart: '',
      dateEnd: '',
      courseLogoSrc: null,
      primaryName: '',
      primarySigImg: null,
      coNA: false,
      coName: '',
      coSigImg: null,
      students: []   // { first, last }
    };
    const sigs = { primary: null, co: null };

    // ---------- step indicator ----------
    let _animating = false;
    let _skipNextAnim = false; // set by swipe commit so setStep doesn't double-animate
    function setStep(n, opts) {
      opts = opts || {};
      const direction = opts.direction || 'auto';
      let animate     = opts.animate   !== false; // default true
      if (_skipNextAnim) { animate = false; _skipNextAnim = false; }

      // Update the step pills at the top
      $$('.steps li').forEach(li => {
        const s = +li.dataset.step;
        li.classList.toggle('active', s === n);
        li.classList.toggle('done', s < n);
      });

      const oldStep = document.querySelector('.step:not(.hidden)');
      const newStep = document.querySelector('.step[data-step="' + n + '"]');
      if (!newStep) return;

      // First render or no animation — just toggle visibility
      if (!animate || !oldStep || oldStep === newStep) {
        $$('.step').forEach(el => {
          el.classList.toggle('hidden', +el.dataset.step !== n);
          el.style.transform = '';
          el.style.opacity   = '';
        });
        if (window.scrollY > 0) window.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }

      // Decide direction (forward/back) automatically if not specified.
      const oldN = +oldStep.dataset.step;
      const fwd  = direction === 'forward' ? true
                  : direction === 'backward' ? false
                  : (n > oldN);

      _animating = true;

      // 1. Park the old step in absolute position so the new one can take its place
      oldStep.classList.add('is-leaving');

      // 2. Show the new step at the off-screen position it should slide IN from
      newStep.classList.remove('hidden');
      newStep.style.transform = 'translateX(' + (fwd ? '100%' : '-100%') + ')';
      newStep.style.opacity   = '0.4';

      // Force a reflow so the browser registers the start state
      // before applying the transition target.
      void newStep.offsetWidth;

      // 3. Slide both
      requestAnimationFrame(() => {
        newStep.style.transform = 'translateX(0)';
        newStep.style.opacity   = '1';
        oldStep.style.transform = 'translateX(' + (fwd ? '-100%' : '100%') + ')';
        oldStep.style.opacity   = '0';
      });

      // 4. Cleanup once the animation completes
      setTimeout(() => {
        oldStep.classList.add('hidden');
        oldStep.classList.remove('is-leaving');
        oldStep.style.transform = '';
        oldStep.style.opacity   = '';
        newStep.style.transform = '';
        newStep.style.opacity   = '';
        _animating = false;
        if (window.scrollY > 0) window.scrollTo({ top: 0, behavior: 'smooth' });
      }, 340);
    }

    // ---------- back ----------
    $('#backHome').addEventListener('click', () => {
      if (confirm('Discard this certificate batch and return to the home screen?')) showHome();
    });
    $$('button[data-prev]').forEach(b => b.addEventListener('click', () => setStep(+b.dataset.prev - 1)));

    // ---------- clickable step pills (desktop + mobile tap) ----------
    // Lets the user jump between Course / Instructors / Roster / Generate
    // by clicking (or tapping) the pills at the top.
    //   - Jumping BACKWARDS: free, no validation.
    //   - Jumping FORWARDS:  runs the Next-button handlers of each
    //     intermediate step so validation still applies. If a step
    //     fails validation we stop there (and the user sees the alert).
    function jumpToStep(target) {
      if (_animating) return;
      const activeLi = document.querySelector('.steps li.active');
      if (!activeLi) return;
      const current = +activeLi.dataset.step;
      if (target === current) return;
      if (target < current) {
        setStep(target);
        return;
      }
      // Forward: chain Next clicks until we hit the target or get
      // blocked by validation.
      let now = current;
      let safety = 10;
      while (now < target && safety-- > 0) {
        const btn = document.querySelector('#step' + now + 'Next');
        if (!btn) break;
        btn.click();
        const afterLi = document.querySelector('.steps li.active');
        const after = afterLi ? +afterLi.dataset.step : now;
        if (after === now) break; // validation blocked advancement
        now = after;
      }
    }
    $$('.steps li').forEach(li => {
      li.setAttribute('role', 'button');
      li.setAttribute('tabindex', '0');
      li.setAttribute('aria-label', 'Go to ' + li.textContent.trim() + ' step');
      li.addEventListener('click', () => jumpToStep(+li.dataset.step));
      li.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          jumpToStep(+li.dataset.step);
        }
      });
    });

    // ---------- step 1: course ----------
    // populate course-logo dropdown
    const logoSel = $('#courseLogo');
    PFD_CONFIG.COURSE_LOGOS.forEach(opt => {
      const o = document.createElement('option');
      o.value = opt.id;
      o.textContent = opt.label;
      o.dataset.src = opt.src || '';
      logoSel.appendChild(o);
    });

    // default start date = today (local time, not UTC)
    const today = new Date();
    const iso = today.getFullYear() + '-' +
                String(today.getMonth() + 1).padStart(2, '0') + '-' +
                String(today.getDate()).padStart(2, '0');
    $('#dateStart').value = iso;

    $$('input[name=dateMode]').forEach(r =>
      r.addEventListener('change', () => {
        const range = $('input[name=dateMode]:checked').value === 'range';
        $('#dateEndWrap').classList.toggle('hidden', !range);
      })
    );

    $('#step1Next').addEventListener('click', () => {
      state.courseName   = $('#courseName').value.trim();
      state.courseNumber = $('#courseNumber').value.trim();
      state.dateMode     = $('input[name=dateMode]:checked').value;
      state.dateStart    = $('#dateStart').value;
      state.dateEnd      = $('#dateEnd').value;
      const opt = logoSel.options[logoSel.selectedIndex];
      state.courseLogoSrc = opt && opt.dataset.src ? opt.dataset.src : null;

      if (!state.courseName)   return alert('Please enter a course name.');
      if (!state.courseNumber) return alert('Please enter a course number.');
      if (!state.dateStart)    return alert('Please choose a course completion date.');
      if (state.dateMode === 'range' && !state.dateEnd) return alert('Please choose an end date.');

      setStep(2);
      // signature pads need to be initialized after the step is visible
      // so the canvases have layout dimensions
      setTimeout(() => {
        if (!sigs.primary) sigs.primary = PFD_SIG.attach($('#primarySigCanvas'));
        if (!sigs.co)      sigs.co      = PFD_SIG.attach($('#coSigCanvas'));
      }, 0);
    });

    // ---------- step 2: instructors ----------
    $$('button[data-clear]').forEach(b =>
      b.addEventListener('click', () => {
        const which = b.dataset.clear === 'primarySigCanvas' ? sigs.primary : sigs.co;
        if (which) which.clear();
      })
    );
    $('#coNA').addEventListener('change', (e) => {
      $('#coBlock').classList.toggle('hidden', e.target.checked);
    });

    $('#step2Next').addEventListener('click', () => {
      state.primaryName  = $('#primaryName').value.trim();
      state.primarySigImg = PFD_SIG.toPNG(sigs.primary);
      state.coNA = $('#coNA').checked;
      if (!state.coNA) {
        state.coName = $('#coName').value.trim();
        state.coSigImg = PFD_SIG.toPNG(sigs.co);
      } else {
        state.coName = '';
        state.coSigImg = null;
      }

      if (!state.primaryName) return alert('Please enter the primary instructor name and title.');
      if (!state.primarySigImg) return alert('Please draw the primary instructor signature.');
      if (!state.coNA) {
        if (!state.coName) return alert('Please enter the co-instructor name and title (or check "No co-instructor").');
        if (!state.coSigImg) return alert('Please draw the co-instructor signature (or check "No co-instructor").');
      }
      setStep(3);
      ensureRosterRows();
    });

    // ---------- step 3: roster ----------
    function rosterRow(idx, first = '', last = '') {
      const tr = document.createElement('tr');
      tr.innerHTML =
        '<td class="row-num">' + (idx + 1) + '</td>' +
        '<td><input type="text" class="r-first" placeholder="First" value="' + escapeAttr(first) + '"></td>' +
        '<td><input type="text" class="r-last"  placeholder="Last"  value="' + escapeAttr(last) + '"></td>' +
        '<td class="row-del"><button class="del-btn" type="button" title="Remove">×</button></td>';
      tr.querySelector('.del-btn').addEventListener('click', () => {
        tr.remove();
        renumber();
      });
      return tr;
    }
    function escapeAttr(s) { return String(s).replace(/"/g, '&quot;'); }
    function renumber() {
      $$('#rosterBody tr').forEach((tr, i) => {
        tr.querySelector('.row-num').textContent = i + 1;
      });
      $('#numStudents').value = $$('#rosterBody tr').length || 1;
    }
    function ensureRosterRows() {
      const want = parseInt($('#numStudents').value, 10) || 1;
      const have = $$('#rosterBody tr').length;
      const tbody = $('#rosterBody');
      if (have < want) {
        for (let i = have; i < want; i++) tbody.appendChild(rosterRow(i));
      }
    }

    $('#numStudents').addEventListener('change', () => {
      const want = parseInt($('#numStudents').value, 10) || 1;
      const tbody = $('#rosterBody');
      const have = tbody.children.length;
      if (want > have) for (let i = have; i < want; i++) tbody.appendChild(rosterRow(i));
      else if (want < have) {
        while (tbody.children.length > want) tbody.removeChild(tbody.lastChild);
      }
      renumber();
    });

    $('#addRow').addEventListener('click', () => {
      const idx = $$('#rosterBody tr').length;
      $('#rosterBody').appendChild(rosterRow(idx));
      $('#numStudents').value = idx + 1;
    });
    $('#clearRoster').addEventListener('click', () => {
      if (!confirm('Clear all roster rows?')) return;
      $('#rosterBody').innerHTML = '';
      $('#numStudents').value = 1;
      ensureRosterRows();
    });

    // CSV upload
    $('#rosterFile').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const text = await file.text();
      const rows = parseCSV(text);
      if (!rows.length) { alert('Could not read any rows from the file.'); return; }
      // detect header row
      const hdr = rows[0].map(c => c.toLowerCase().trim());
      let firstIdx = 0, lastIdx = 1;
      if (hdr.some(c => c.includes('first') || c.includes('last') || c === 'name')) {
        const fi = hdr.findIndex(c => c.includes('first'));
        const li = hdr.findIndex(c => c.includes('last'));
        if (fi >= 0) firstIdx = fi;
        if (li >= 0) lastIdx  = li;
        rows.shift();
      }
      // Replace existing rows
      $('#rosterBody').innerHTML = '';
      rows.forEach((r, i) => {
        const f = (r[firstIdx] || '').trim();
        const l = (r[lastIdx]  || '').trim();
        if (!f && !l) return;
        // If the file uses a single combined "Name" column, split it
        if (!l && f.includes(' ')) {
          const parts = f.split(/\s+/);
          const fn = parts.shift();
          const ln = parts.join(' ');
          $('#rosterBody').appendChild(rosterRow($$('#rosterBody tr').length, fn, ln));
        } else {
          $('#rosterBody').appendChild(rosterRow($$('#rosterBody tr').length, f, l));
        }
      });
      $('#numStudents').value = $$('#rosterBody tr').length || 1;
      e.target.value = '';
    });

    function parseCSV(text) {
      // tiny CSV/TSV parser — handles quoted commas
      const lines = text.split(/\r?\n/).filter(l => l.trim().length);
      const isTSV = text.indexOf('\t') !== -1 && (text.indexOf(',') === -1 || text.indexOf('\t') < text.indexOf(','));
      const sep = isTSV ? '\t' : ',';
      return lines.map(line => {
        const out = []; let cur = ''; let inQ = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (inQ) {
            if (ch === '"' && line[i+1] === '"') { cur += '"'; i++; }
            else if (ch === '"') inQ = false;
            else cur += ch;
          } else {
            if (ch === '"') inQ = true;
            else if (ch === sep) { out.push(cur); cur = ''; }
            else cur += ch;
          }
        }
        out.push(cur);
        return out;
      });
    }

    $('#step3Next').addEventListener('click', () => {
      const rows = $$('#rosterBody tr').map(tr => ({
        first: tr.querySelector('.r-first').value.trim(),
        last:  tr.querySelector('.r-last').value.trim()
      })).filter(r => r.first || r.last);
      if (!rows.length) return alert('Add at least one student to the roster.');
      const bad = rows.find(r => !r.first || !r.last);
      if (bad) return alert('Every row needs both a first and last name.');
      state.students = rows;
      // Fill review block
      $('#rvCourse').textContent  = state.courseName;
      $('#rvNumber').textContent  = state.courseNumber;
      $('#rvDate').textContent    = state.dateMode === 'range' && state.dateEnd
        ? formatDateNice(state.dateStart) + ' – ' + formatDateNice(state.dateEnd)
        : formatDateNice(state.dateStart);
      $('#rvPrimary').textContent = state.primaryName;
      $('#rvCo').textContent      = state.coNA ? '— (none)' : state.coName;
      $('#rvCount').textContent   = state.students.length;
      setStep(4);
    });

    function formatDateNice(iso) {
      if (!iso) return '';
      const [y,m,d] = iso.split('-').map(Number);
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      return months[m-1] + ' ' + d + ', ' + y;
    }

    // ---------- step 4: generate ----------
    $('#generateBtn').addEventListener('click', async () => {
      const fmt = $('input[name=outFmt]:checked').value;
      const status = $('#generateStatus');
      const downloads = $('#downloadList');
      downloads.innerHTML = '';
      status.classList.remove('hidden', 'ok', 'err');
      status.classList.add('status');
      status.textContent = 'Rendering certificate 1 of ' + state.students.length + '…';

      try {
        const files = await PFD_CERT.generate(state, state.students, fmt, (done, total) => {
          status.textContent = 'Rendered ' + done + ' of ' + total + ' certificate(s)…';
        });
        // Build download links
        files.forEach(f => {
          const url = URL.createObjectURL(f.blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = f.name;
          a.innerHTML = '<span>' + f.name + '</span><span>Download ↓</span>';
          downloads.appendChild(a);
        });
        status.textContent = 'Done. ' + files.length + ' file(s) ready below.';
        status.classList.add('ok');
        // Render preview of first
        const wrap = $('#previewWrap');
        wrap.classList.remove('hidden');
        await PFD_CERT.previewCanvas(state, state.students[0], $('#previewCanvas'));
      } catch (err) {
        console.error(err);
        status.textContent = 'Something went wrong: ' + (err && err.message ? err.message : err);
        status.classList.add('err');
      }
    });

    // ---------- swipe navigation ----------
    // Live finger/mouse tracking. The form follows the pointer and a
    // preview of the adjacent step slides in alongside it. On release,
    // the gesture either commits (next step) or snaps back, with a
    // smooth animation that picks up exactly where the drag left off.
    (function attachSwipe() {
      const stage = document.querySelector('.step-stage');
      if (!stage) return;
      const stageWidth = () => stage.getBoundingClientRect().width;
      const SLOP = 8;          // pixels before we decide horizontal vs vertical
      const COMMIT_FRAC = 0.25;
      const COMMIT_VEL_MS = 500;
      const COMMIT_VEL_DX = 50;

      // Gesture state ---------------------------------------------------
      let pending = false;     // we're watching but haven't claimed yet
      let active  = false;     // we own the gesture (no scrolling/typing)
      let sx = 0, sy = 0, st = 0, dx = 0;
      let oldStep = null, peekStep = null;
      let direction = 'forward';

      function pointer(e) {
        return e.touches && e.touches[0] ? e.touches[0]
             : e.changedTouches && e.changedTouches[0] ? e.changedTouches[0]
             : e;
      }
      function isProtected(t) {
        // Areas where horizontal drags must NEVER become a swipe
        // (drawing on the signature pad, scrolling roster table)
        return t && t.closest && (t.closest('.sigpad') || t.closest('.roster'));
      }
      function isInteractive(t) {
        // Form fields where we should let a tap focus the field but
        // still allow swipe if the user actually drags horizontally
        return t && t.matches && t.matches('input,textarea,select,button');
      }
      function currentStep() {
        const a = document.querySelector('.steps li.active');
        return a ? +a.dataset.step : 0;
      }
      function neighborStep(dir) {
        const n = currentStep();
        const target = dir === 'forward' ? n + 1 : n - 1;
        return document.querySelector('.step[data-step="' + target + '"]');
      }

      function reset() {
        pending = false; active = false;
        if (oldStep) {
          oldStep.classList.remove('is-dragging');
          oldStep.style.transition = '';
          oldStep.style.transform  = '';
          oldStep.style.opacity    = '';
        }
        if (peekStep) {
          peekStep.classList.remove('is-dragging-peek');
          peekStep.classList.add('hidden');
          peekStep.style.transition = '';
          peekStep.style.transform  = '';
          peekStep.style.opacity    = '';
        }
        oldStep = peekStep = null;
      }

      function setPeek(dir) {
        const want = neighborStep(dir);
        if (want === peekStep) return;
        if (peekStep) {
          peekStep.classList.remove('is-dragging-peek');
          peekStep.classList.add('hidden');
          peekStep.style.transform = '';
          peekStep.style.opacity   = '';
        }
        peekStep = want || null;
        if (peekStep) {
          peekStep.classList.remove('hidden');
          peekStep.classList.add('is-dragging-peek');
          peekStep.style.opacity = '0.92';
        }
      }

      function commitTo(dir) {
        // Animate everything to its final position, THEN hand over to
        // setStep with animate:false so the validation/state updates
        // happen without a second visual transition.
        const w = stageWidth();
        const targetOldX = dir === 'forward' ? -w : w;
        const ease = 'cubic-bezier(0.22, 0.84, 0.34, 1.04)';
        if (oldStep) {
          oldStep.style.transition = `transform 280ms ${ease}, opacity 220ms ease`;
          oldStep.style.transform  = `translateX(${targetOldX}px)`;
          oldStep.style.opacity    = '0';
        }
        if (peekStep) {
          peekStep.style.transition = `transform 280ms ${ease}, opacity 220ms ease`;
          peekStep.style.transform  = 'translateX(0px)';
          peekStep.style.opacity    = '1';
        }
        const fromStep = currentStep();
        const toStep   = dir === 'forward' ? fromStep + 1 : fromStep - 1;
        setTimeout(() => {
          // Run the appropriate Continue/Back handler — that performs
          // validation AND triggers any post-step setup (sig pads etc).
          // Tell setStep to skip its animation since our drag already
          // moved the elements to the final position.
          const before = currentStep();
          _skipNextAnim = true;
          if (dir === 'forward') {
            const handler = ({1:'#step1Next',2:'#step2Next',3:'#step3Next'})[fromStep];
            if (handler) document.querySelector(handler).click();
          } else {
            const back = document.querySelector('button[data-prev="' + fromStep + '"]');
            if (back) back.click();
          }
          _skipNextAnim = false;
          const after = currentStep();
          if (after === before) {
            // Validation FAILED. Bring the form back so the user can fix it.
            snapBack();
          } else {
            // Successfully advanced. setStep already toggled .hidden on
            // both elements via animate:false path. Just clear our
            // gesture flags — DON'T touch DOM (would re-hide the new step).
            pending = false; active = false;
            if (oldStep) oldStep.classList.remove('is-dragging');
            if (peekStep) peekStep.classList.remove('is-dragging-peek');
            oldStep = peekStep = null;
          }
        }, 290);
      }

      function snapBack() {
        const ease = 'cubic-bezier(0.22, 0.84, 0.34, 1.04)';
        if (oldStep) {
          oldStep.style.transition = `transform 220ms ${ease}, opacity 200ms ease`;
          oldStep.style.transform  = 'translateX(0px)';
          oldStep.style.opacity    = '1';
        }
        if (peekStep) {
          const w = stageWidth();
          peekStep.style.transition = `transform 220ms ${ease}, opacity 180ms ease`;
          peekStep.style.transform  = `translateX(${dx < 0 ? w : -w}px)`;
          peekStep.style.opacity    = '0';
        }
        setTimeout(reset, 240);
      }

      // Pointer handlers ---------------------------------------------
      function onStart(e) {
        if (_animating) return;
        if (isProtected(e.target)) return;          // sigpad / roster
        const t = pointer(e);
        sx = t.clientX; sy = t.clientY; st = Date.now(); dx = 0;
        pending = true; active = false;
        oldStep = document.querySelector('.step:not(.hidden):not(.is-leaving)');
      }

      function onMove(e) {
        if (!pending && !active) return;
        const t = pointer(e);
        dx = t.clientX - sx;
        const dy = t.clientY - sy;

        if (!active) {
          // Still deciding whether this is a swipe or a tap/scroll
          if (Math.abs(dx) < SLOP && Math.abs(dy) < SLOP) return;
          if (Math.abs(dy) > Math.abs(dx)) { pending = false; return; } // vertical scroll
          // Horizontal! Claim the gesture.
          active = true; pending = false;
          // If a form field had focus, blur it so we don't trap text input
          if (document.activeElement && document.activeElement !== document.body) {
            try { document.activeElement.blur(); } catch (_) {}
          }
          oldStep.classList.add('is-dragging');
        }

        direction = dx < 0 ? 'forward' : 'backward';
        setPeek(direction);
        oldStep.style.transform = `translateX(${dx}px)`;
        if (peekStep) {
          const w = stageWidth();
          peekStep.style.transform = `translateX(${direction === 'forward' ? w + dx : -w + dx}px)`;
        }
        if (e.cancelable) e.preventDefault();
      }

      function onEnd() {
        if (!active) { reset(); return; }
        const w = stageWidth();
        const fast = (Date.now() - st) < COMMIT_VEL_MS && Math.abs(dx) > COMMIT_VEL_DX;
        const far  = Math.abs(dx) > w * COMMIT_FRAC;
        const shouldCommit = (fast || far) && peekStep;
        if (shouldCommit) commitTo(direction);
        else              snapBack();
      }

      // Wire up — touch + mouse, listeners on document so a drag that
      // wanders outside the stage element still completes.
      document.addEventListener('touchstart',  onStart, { passive: true });
      document.addEventListener('touchmove',   onMove,  { passive: false });
      document.addEventListener('touchend',    onEnd,   { passive: true });
      document.addEventListener('touchcancel', onEnd,   { passive: true });
      document.addEventListener('mousedown',   onStart);
      document.addEventListener('mousemove',   onMove);
      document.addEventListener('mouseup',     onEnd);
    })();

    setStep(1, { animate: false });
  }

  // -------------- kick off ---------------------------------
  start();

})();

</script>





</body>
</html>
